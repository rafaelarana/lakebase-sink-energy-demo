# Schema + checkpoint volume (in an EXISTING catalog), and the Lakebase Autoscale project.
# All DAB-managed: `bundle deploy` creates them, `bundle destroy` removes them.
# The CATALOG is an input (var.catalog) — it must already exist. (Creating a catalog needs
# DAB's `direct` engine + a metastore storage location, which isn't portable across accounts;
# keeping the catalog workspace-governed matches the common pattern.)
resources:
  schemas:
    ops:
      catalog_name: ${var.catalog}
      name: ${var.ops_schema}
      comment: "Bronze reading history (Zerobus landing) + dim_asset reference"

  volumes:
    checkpoints:
      catalog_name: ${var.catalog}
      schema_name: ${resources.schemas.ops.name}
      name: checkpoints
      volume_type: MANAGED
      comment: "Structured Streaming checkpoints"

  # Lakebase Autoscale. Declaring the PROJECT is enough — it auto-creates the
  # `production` branch, a `primary` endpoint (default autoscaling min=max=1 CU) and
  # the `databricks-postgres` database (note the HYPHEN — confirmed on a live project).
  # Declaring postgres_branches/postgres_endpoints for those auto-created names fails
  # with "already exists"; to change CU or use a non-default branch, declare a NEW one.
  postgres_projects:
    lakebase:
      project_id: ${var.lakebase_project_id}
      display_name: "Lakebase streaming-sink demo — asset live state"
      pg_version: 17
      enable_pg_native_login: false
