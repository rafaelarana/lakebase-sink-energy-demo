# Two jobs (notebook-based):
#   setup_demo         — one-time provisioning of the objects DAB can't declare
#                        (bronze Delta table, dim_asset seed, Postgres asset_live_state
#                        PK table + grants). Serverless notebooks.
#   stream_to_lakebase — the demo's star: Structured Streaming bronze Delta → Lakebase SINK.
#                        Runs on a CLASSIC DBR 18.3+ cluster (the sink does NOT support serverless).
# Notebook paths are relative to THIS file (resources/), hence ../notebooks/...  (no .py).
resources:
  jobs:
    setup_demo:
      name: "[lb-sink-demo] setup — tables + dim_asset + Lakebase DDL"
      tags: { project: lakebase-sink-demo, kind: setup }
      tasks:
        - task_key: bronze_and_dim
          notebook_task:
            notebook_path: ../notebooks/01_bronze_and_dim.py
            base_parameters:
              catalog: ${var.catalog}
              ops_schema: ${resources.schemas.ops.name}   # resolved (dev mode prefixes it)
        - task_key: lakebase_ddl
          depends_on:
            - task_key: bronze_and_dim
          notebook_task:
            notebook_path: ../notebooks/02_lakebase_ddl.py
            base_parameters:
              project_id: ${var.lakebase_project_id}
              database: ${var.lakebase_database}
              dbtable: ${var.lakebase_dbtable}

    stream_to_lakebase:
      name: "[lb-sink-demo] stream — bronze Delta → Lakebase sink"
      tags: { project: lakebase-sink-demo, kind: realtime }
      continuous:
        # UNPAUSED auto-starts the (billable, classic) sink on every deploy. Set
        # stream_pause=PAUSED to deploy the objects without launching the cluster.
        pause_status: ${var.stream_pause}
      tasks:
        - task_key: sink
          notebook_task:
            notebook_path: ../notebooks/03_sink_to_lakebase.py
            base_parameters:
              catalog: ${var.catalog}
              ops_schema: ${resources.schemas.ops.name}
              lb_project_id: ${var.lakebase_project_id}
              lb_database: ${var.lakebase_database}
              lb_dbtable: ${var.lakebase_dbtable}
              trigger_mode: ${var.trigger_mode}
              processing_interval: ${var.processing_interval}
          job_cluster_key: sink_cluster
      job_clusters:
        - job_cluster_key: sink_cluster
          new_cluster:
            # Lakebase sink: DBR 18.3+ on CLASSIC compute, dedicated/standard access mode.
            # NOTE: Real-Time Mode (.trigger(realTime=...)) is NOT usable here — RTM does not
            # support a Delta input stream (error STREAMING_REAL_TIME_MODE.INPUT_STREAM_NOT_SUPPORTED;
            # it needs Kafka/Kinesis-style sources). This Delta-sourced sink runs in processing mode.
            spark_version: ${var.dbr_version}
            runtime_engine: PHOTON
            node_type_id: ${var.node_type_id}
            num_workers: 1
            data_security_mode: SINGLE_USER
